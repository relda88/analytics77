# hxgo lint configuration

version: "2"

linters:
  default: all

  enable:
    - wsl_v5

  disable:
    - canonicalheader
    - containedctx
    - contextcheck
    - cyclop
    - depguard
    - dupword
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errorlint
    - errname
    - exhaustruct
    - exhaustive
    - forbidigo
    - funlen
    - funcorder
    - forcetypeassert
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - gocritic
    - godoclint
    - godot
    - godox
    - gosmopolitan
    - goprintffuncname
    - inamedparam
    - intrange
    - ireturn
    - lll
    - maintidx
    - mnd
    - nestif
    - noinlineerr
    - nolintlint
    - paralleltest
    - perfsprint
    - recvcheck
    - tagalign
    - tagliatelle
    - testpackage
    - testifylint
    - unparam
    - varnamelen
    - wrapcheck
    - wsl
    - zerologlint

  settings:
    govet:
      enable:
        - fieldalignment
    gosec:
      excludes:
        - G103

    gocritic:
      disabled-checks:
        - commentFormatting
        - assignOp

    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Println
        - os.Close
        - strings.Builder.WriteString
        - (io.Closer).Close

    ireturn:
      allow:
        - error

    tagliatelle:
      case:
        rules:
          yaml: snake

    revive:
      enable-all-rules: true
      rules:
        # ============================
        # ERROR-FIRST RULES
        # ============================
        - name: line-length-limit
          severity: error
          arguments: [190]

        # ============================
        # ACTIVE RULES WITH ARGUMENTS
        # ============================
        - name: atomic

        - name: unhandled-error
          exclude:
            - "**/*_test.go"
          arguments:
            - fmt.Printf
            - fmt.Println
            - strings.Builder.WriteString
            - strings.Builder.WriteByte
            - io.Closer.Close
            - net/http.ResponseWriter.Write

        - name: function-length
          arguments: [0, 0]
          disabled: false
          exclude: ["_test.go"]

        - name: cognitive-complexity
          arguments: [60]

        - name: cyclomatic
          arguments: [18]

        - name: max-control-nesting
          arguments: [7]

        # ============================
        # revive DISABLED RULES
        # ============================
        - name: package-comments
          disabled: true

        - name: add-constant
          disabled: true

        - name: exported
          disabled: true
          arguments:
            - disableChecksOnTypes
            - disableChecksOnConstants

        - name: filename-format
          disabled: true

        - name: max-public-structs
          disabled: true

        - name: call-to-gc
          disabled: true

        - name: comment-spacings 
          disabled: true

        - name: confusing-naming
          disabled: true

        - name: deep-exit
          disabled: true

        - name: enforce-switch-style
          disabled: true

        - name: flag-parameter
          disabled: true

        - name: confusing-results
          disabled: true

        - name: unused-parameter
          disabled: true

        - name: use-waitgroup-go
          disabled: true

        - name: unexported-return
          disabled: true

        - name: modifies-value-receiver 
          disabled: true

        - name: nested-structs
          disabled: true

        - name: var-naming 
          disabled: true

    # check in .linting with ./golangci-lint linters | grep modernize -A 20
    modernize:
        disable:
          - fmtappendf
          - minmax

    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2

  exclusions:
    generated: lax
    rules:
      - path: (.+)_test.go
        linters:
          - gosec
          - dupl
          - goconst
      - path: helpers/(.+).go
        linters:
          - gosec
          - mnd
      - path: "(.+).go"
        linters:
          - staticcheck
        text: "could remove embedded field"

formatters:
  enable:
    - gofmt
    - goimports